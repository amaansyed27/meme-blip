name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - run: npm run build
      - run: npm run build:companion
