name: Release Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install WiX Toolset
        run: choco install wixtoolset -y --no-progress

      - name: Package Windows installer
        shell: powershell
        run: npm run package:windows

      - name: Verify installer exists
        shell: powershell
        run: |
          if (!(Test-Path release\MemeBlip-Setup.msi)) { throw "release\MemeBlip-Setup.msi was not created" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: memeblip-windows-installer
          path: release/MemeBlip-Setup.msi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/MemeBlip-Setup.msi
          body: |
            Install MemeBlip from the landing page:
            https://memeblip.dawnlightlabs.com/

            This release publishes the Windows MSI used by the landing-page download button.
            VB-CABLE is not bundled or silently installed; MemeBlip will guide users through audio routing separately.
          generate_release_notes: true
