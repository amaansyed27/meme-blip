name: Release Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, with or without the v prefix
        required: false
        type: string
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, 'Publish v'))
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve and validate release version
        id: release
        shell: powershell
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          $packageVersion = [string](Get-Content package.json -Raw | ConvertFrom-Json).version
          $cargoText = Get-Content native/Cargo.toml -Raw
          $cargoMatch = [regex]::Match($cargoText, '(?m)^version\s*=\s*"([^"]+)"')
          if (!$cargoMatch.Success) { throw 'Could not read the native Cargo version.' }
          $cargoVersion = $cargoMatch.Groups[1].Value

          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $tag = $env:GITHUB_REF_NAME
            $target = $env:GITHUB_SHA
          } elseif ($env:REQUESTED_VERSION) {
            $tag = if ($env:REQUESTED_VERSION.StartsWith('v')) { $env:REQUESTED_VERSION } else { "v$($env:REQUESTED_VERSION)" }
            $target = $env:GITHUB_SHA
          } elseif ($env:PR_TITLE) {
            $titleMatch = [regex]::Match($env:PR_TITLE, '^Publish v(\d+\.\d+\.\d+)$')
            if (!$titleMatch.Success) { throw "Invalid release pull request title: $($env:PR_TITLE)" }
            $tag = "v$($titleMatch.Groups[1].Value)"
            $target = $env:PR_BASE_SHA
          } else {
            $tag = "v$packageVersion"
            $target = $env:GITHUB_SHA
          }

          $releaseVersion = $tag.TrimStart('v')
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') { throw "Invalid release tag: $tag" }
          if ($packageVersion -ne $releaseVersion) { throw "package.json is $packageVersion but release is $releaseVersion" }
          if ($cargoVersion -ne $releaseVersion) { throw "native/Cargo.toml is $cargoVersion but release is $releaseVersion" }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$releaseVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "target=$target" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set MSI version
        shell: powershell
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          $path = 'scripts/package-windows.ps1'
          $content = Get-Content $path -Raw
          $updated = [regex]::Replace(
            $content,
            '(?m)^\$Version = "[^"]+"\r?$',
            { param($match) '$Version = "' + $env:RELEASE_VERSION + '"' }
          )
          if ($updated -eq $content) { throw 'Could not update the MSI version in package-windows.ps1.' }
          Set-Content -Path $path -Value $updated -Encoding UTF8

      - name: Install WiX Toolset
        run: choco install wixtoolset -y --no-progress

      - name: Package Windows installer
        shell: powershell
        run: npm run package:windows

      - name: Verify installer exists
        shell: powershell
        run: |
          if (!(Test-Path release\MemeBlip-Setup.msi)) { throw 'release\MemeBlip-Setup.msi was not created' }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: memeblip-windows-installer-${{ steps.release.outputs.version }}
          path: release/MemeBlip-Setup.msi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ steps.release.outputs.target }}
          name: MemeBlip ${{ steps.release.outputs.tag }}
          files: release/MemeBlip-Setup.msi
          body: |
            MemeBlip ${{ steps.release.outputs.version }} fixes local sound uploads that failed for normal audio files larger than Axum's previous default multipart limit.

            Changes:
            - local clips up to 20 MB can be imported
            - multiple clips can be selected and imported sequentially
            - empty and oversized files return readable errors
            - the file picker resets correctly after an import attempt

            Install from:
            https://memeblip.dawnlightlabs.com/
          generate_release_notes: true
