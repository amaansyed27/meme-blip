name: Release Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install WiX Toolset
        run: choco install wixtoolset -y --no-progress

      - name: Package Windows installer
        shell: powershell
        run: npm run package:windows

      - name: Verify installer exists
        shell: powershell
        run: |
          if (!(Test-Path release\MemeBlip-Setup.msi)) { throw "release\MemeBlip-Setup.msi was not created" }
          if (!(Test-Path release\MemeBlip-Windows.zip)) { throw "release\MemeBlip-Windows.zip was not created" }

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memeblip-windows
          path: |
            release/MemeBlip-Setup.msi
            release/MemeBlip-Windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/MemeBlip-Setup.msi
            release/MemeBlip-Windows.zip
          generate_release_notes: true
