name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        run: npm install
      - name: Build web app
        run: npm run build
      - name: Check native companion
        run: cargo check --manifest-path native/Cargo.toml
      - name: Build native companion
        run: cargo build --manifest-path native/Cargo.toml
